## Settings file was created by plugin LateRepo Fix v1.1.4
## Plugin GUID: laterepo.fix.runtime

[General]

## Enable extra logs for LateRepo Fix.
# Setting type: Boolean
# Default value: false
DebugLogging = false

[Host]

## Keep the Steam lobby joinable for late joins while the host is already in an active run.
# Setting type: Boolean
# Default value: true
AllowJoiningDuringActiveRound = true

## Keep the Photon room open and visible while active round joining is enabled.
# Setting type: Boolean
# Default value: true
KeepPhotonRoomOpenDuringActiveRound = true

[Items]

## Send current ItemBattery charge state only to newly joined clients so vanilla battery UI starts with the correct bar count.
# Setting type: Boolean
# Default value: true
SyncItemBatteryStateForLateJoiners = true

## Repair vanilla inventory battery visuals when a late-joined client has batteryLife but a stale private battery bar counter.
# Setting type: Boolean
# Default value: true
RepairInventoryBatteryUiForLateJoiners = true

[Level]

## Repair module connection state for late joiners before client block generation and replay the host state after their avatar is ready.
# Setting type: Boolean
# Default value: true
SyncModuleConnectionsForLateJoiners = true

